name: Build Windows App

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]  # "v"で始まるタグ（v1.0.0など）がプッシュされた時にトリガー
  workflow_dispatch:

# GitHub Tokenの権限設定（Release作成に必要）
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. コードのチェックアウト
    - uses: actions/checkout@v4

    # 2. Pythonのセットアップ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. 依存関係のインストール
    - name: Install dependencies
      shell: pwsh
      run: |
        pip install -r requirements.txt
        pip install "flet-desktop>=0.21,<0.28" pyinstaller

    # 4. PyInstaller でビルド
    - name: Build Windows App
      env:
        PYTHONUTF8: "1"
      shell: pwsh
      run: pyinstaller --name VRCInviteTool --onefile --windowed --collect-all flet --collect-all flet_desktop main.py

    # 5. 成果物をArtifactsにアップロード 
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VRCInviteTool
        path: dist/VRCInviteTool.exe

    # 6. ZIP化
    - name: Zip artifact
      shell: pwsh
      run: Compress-Archive -Path dist/VRCInviteTool.exe -DestinationPath dist/VRCInviteTool.zip

    # 7. Releaseを作成してファイルを添付
    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/VRCInviteTool.zip
        draft: true
        prerelease: false
